<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | CommUNIT-E</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Arial", sans-serif;
        background: #f4f9f7;
        color: #173841;
      }
      main {
        max-width: 520px;
        margin: 24px;
        border: 1px solid rgba(15, 102, 113, 0.18);
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 22px 52px rgba(10, 58, 66, 0.12);
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>CommUNIT-E could not reach the network right now. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
